    <!-- Page-specific Scripts -->
    <script>
        // --- Project Data Access ---
        // projectsData is defined in scripts.js and should be globally available here.
        
        // Global variables to store current index and filtered project list for modal navigation
        let currentModalProjectIndex = -1;
        let currentlyFilteredProjects = [];

        // Function to create a project card HTML element (Slightly modified to include 'all' tag)
        function createProjectCard(project) {
            const card = document.createElement('div');
            // Ensure every card has the 'all' tag for the default filter
            card.className = 'project-card rounded-lg p-6 transition-colors-shadow flex flex-col min-w-0';
            card.dataset.tags = project.tags.join(' ') + ' all'; 

            card.innerHTML = `
                ${project.livedemo ? `<a href="${project.livedemo}" target="_blank" aria-label="Live demo of ${project.title}" class="block">` : ''}
                    <img src="${project.image}" alt="${project.title}" loading="lazy" class="project-image">
                ${project.livedemo ? `</a>` : ''}
                <h4 class="text-xl font-semibold mb-3 break-words">${project.title}</h4>
                <p class="short-summary text-base mb-2 flex-grow break-words">${project.shortDescription}</p>
                <div class="project-card-actions flex items-center justify-between mt-auto pt-4 border-t border-gray-200 dark:border-gray-700 transition-colors-shadow">
                    <button class="btn-secondary-small toggle-project-details" data-project-id="${project.id}">Details</button>
                    <div class="flex space-x-3 text-xl">
                        ${project.github ? `<a href="${project.github}" target="_blank" aria-label="GitHub" class="project-action-icon"><i class="fab fa-github"></i></a>` : ''}
                        ${project.livedemo ? `<a href="${project.livedemo}" target="_blank" aria-label="Live Demo" class="project-action-icon"><i class="fas fa-external-link-alt"></i></a>` : ''}
                    </div>
                </div>
            `;
            return card;
        }

        // Function to render projects based on a filter or search results
        function renderProjects(projectsToRender) {
            const individualGrid = document.getElementById('individual-projects-grid');
            const teamGrid = document.getElementById('team-projects-grid');
            const individualHeader = document.getElementById('individualProjectsHeader');
            const teamHeader = document.getElementById('teamProjectsHeader');
            
            if (!individualGrid || !teamGrid) return;

            individualGrid.innerHTML = '';
            teamGrid.innerHTML = '';

            // Sort projects by date in descending order (most recent first)
            const sortedProjects = [...projectsToRender].sort((a, b) => {
                const dateA = new Date(a.date.replace(/ \(.*\)/, ''));
                const dateB = new Date(b.date.replace(/ \(.*\)/, ''));
                return dateB - dateA;
            });

            currentlyFilteredProjects = sortedProjects;
            
            if (currentlyFilteredProjects.length === 0) {
                individualGrid.innerHTML = '<p class="text-lg text-center col-span-full py-10 dark:text-text-color-dark">No projects match your current criteria.</p>';
                individualHeader.style.display = 'none';
                teamHeader.style.display = 'none';
                return;
            }
            
            individualHeader.style.display = 'block';
            teamHeader.style.display = 'block';


            let hasIndividual = false;
            let hasTeam = false;

            sortedProjects.forEach(project => {
                const card = createProjectCard(project);
                if (project.type === 'individual') {
                    individualGrid.appendChild(card);
                    hasIndividual = true;
                } else if (project.type === 'team') {
                    teamGrid.appendChild(card);
                    hasTeam = true;
                }
            });
            
            // Show/Hide headers based on filtered content
            individualHeader.style.display = hasIndividual ? 'block' : 'none';
            teamHeader.style.display = hasTeam ? 'block' : 'none';


            // Re-attach event listeners for dynamically created buttons
            document.querySelectorAll('.toggle-project-details').forEach(button => {
                button.addEventListener('click', (e) => {
                    const projectId = e.target.dataset.projectId;
                    const project = currentlyFilteredProjects.find(p => p.id === projectId);
                    if (project) {
                        openProjectModal(project);
                    }
                });
            });
        }


        // --- 1. Filtering Logic (Fix) ---

        function handleFiltering(filterTag) {
            // Clear search input if filtering
            if (projectSearchInput) {
                projectSearchInput.value = '';
                if (clearSearchBtn) clearSearchBtn.classList.add('hidden');
            }
            document.getElementById('searchSuggestions').classList.add('hidden');
            
            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.filter-btn[data-filter="${filterTag}"]`).classList.add('active');

            let filtered;
            if (filterTag === 'all') {
                filtered = projectsData;
            } else {
                filtered = projectsData.filter(project => project.tags.includes(filterTag));
            }
            
            renderProjects(filtered);
        }


        // --- 2. Search Logic and Suggestions (New Feature) ---

        const projectSearchInput = document.getElementById('projectSearchInput');
        const searchSuggestionsContainer = document.getElementById('searchSuggestions');
        // NEW REFERENCE
        const clearSearchBtn = document.getElementById('clearSearchBtn'); 
        const MIN_SEARCH_LENGTH = 1; 

        function getSearchMatches(query) {
            if (!query) return [];
            const lowerQuery = query.toLowerCase();
            
            return projectsData.filter(project => 
                // Search across multiple fields
                project.title.toLowerCase().includes(lowerQuery) ||
                (project.shortDescription && project.shortDescription.toLowerCase().includes(lowerQuery)) ||
                (project.fullDescription && project.fullDescription.toLowerCase().includes(lowerQuery)) ||
                project.tools.some(tool => tool.toLowerCase().includes(lowerQuery)) ||
                project.tags.some(tag => tag.toLowerCase().includes(lowerQuery))
            ).slice(0, 10); // Limit suggestions to 10
        }

        function renderSuggestions(matches) {
            searchSuggestionsContainer.innerHTML = '';
            
            if (matches.length === 0) {
                searchSuggestionsContainer.innerHTML = `
                    <div class="p-4 text-center dark:text-text-color-dark">No matching projects found.</div>
                `;
                searchSuggestionsContainer.classList.remove('hidden');
                return;
            }

            matches.forEach(project => {
                const suggestionItem = document.createElement('div');
                suggestionItem.className = 'suggestion-item';
                
                // When a suggestion is clicked, execute the full search and render projects
                suggestionItem.addEventListener('click', () => {
                    // Set the search input to the project title
                    projectSearchInput.value = project.title;
                    // Execute the filter/render using the full match list
                    handleSearchExecution(project.title);
                });

                suggestionItem.innerHTML = `
                    <img src="${project.image}" alt="${project.title}" class="suggestion-item-image">
                    <div class="flex flex-col min-w-0">
                        <div class="suggestion-item-title">${project.title}</div>
                        <div class="suggestion-item-description">${project.shortDescription || project.type}</div>
                    </div>
                `;
                searchSuggestionsContainer.appendChild(suggestionItem);
            });

            searchSuggestionsContainer.classList.remove('hidden');
        }
        
        // NEW FUNCTION: Handle clearing the search
        function handleClearSearch() {
            if (!projectSearchInput) return;
            projectSearchInput.value = '';
            clearSearchBtn.classList.add('hidden');
            searchSuggestionsContainer.classList.add('hidden');
            
            // Re-render all projects and reset filters (robust reset)
            handleFiltering('all'); 
        }

        function handleSearchInput() {
            const query = projectSearchInput.value.trim();
            
            // Manage clear button visibility (NEW)
            if (clearSearchBtn) {
                if (query.length > 0) {
                    clearSearchBtn.classList.remove('hidden');
                } else {
                    clearSearchBtn.classList.add('hidden');
                }
            }
            
            if (query.length >= MIN_SEARCH_LENGTH) {
                const matches = getSearchMatches(query);
                renderSuggestions(matches);
            } else {
                searchSuggestionsContainer.classList.add('hidden');
            }
        }
        
        function handleSearchExecution(query) {
            // Clear active filter button state
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.filter-btn[data-filter="all"]`).classList.add('active'); // Re-activate 'All' filter

            const matchedProjects = getSearchMatches(query);
            renderProjects(matchedProjects);
            
            // Hide suggestions dropdown
            searchSuggestionsContainer.classList.add('hidden');
        }


        // --- 3. Initialization and Modal Logic ---

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof projectsData !== 'undefined') {
                renderProjects(projectsData);
            }
            
            // Attach filtering listeners
            document.querySelectorAll('.filter-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    handleFiltering(e.target.dataset.filter);
                });
            });

            // Attach search listeners
            if (projectSearchInput) {
                projectSearchInput.addEventListener('input', handleSearchInput);
                
                // Search execution upon pressing Enter
                projectSearchInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        handleSearchExecution(projectSearchInput.value.trim());
                    }
                });
                
                // Attach clear button listener (NEW)
                if (clearSearchBtn) {
                    clearSearchBtn.addEventListener('click', handleClearSearch);
                    
                    // Initial check for clear button visibility
                    if (projectSearchInput.value.trim().length > 0) {
                        clearSearchBtn.classList.remove('hidden');
                    }
                }
            }

            // Hide suggestions when clicking outside
            document.addEventListener('click', (e) => {
                if (projectSearchInput && searchSuggestionsContainer && 
                    !projectSearchInput.contains(e.target) && 
                    !searchSuggestionsContainer.contains(e.target) &&
                    (!clearSearchBtn || !clearSearchBtn.contains(e.target))) // Check clear button too
                {
                    searchSuggestionsContainer.classList.add('hidden');
                }
            });
            
            // Re-show suggestions if user focuses back on input
            if (projectSearchInput) {
                projectSearchInput.addEventListener('focus', handleSearchInput);
            }
        });

        // Project Modal Logic
        const projectModal = document.getElementById('projectModal');
        const modalCloseBtn = projectModal.querySelector('.modal-close-btn');
        const modalImage = document.getElementById('modal-project-image');
        const modalTitle = document.getElementById('modal-project-title');
        const modalDescription = document.getElementById('modal-project-description');
        const modalTools = document.getElementById('modal-project-tools');
        const modalDate = document.getElementById('modal-project-date');
        const modalGithubLink = document.getElementById('modal-github-link');
        const modalLivedemoLink = document.getElementById('modal-livedemo-link');
        const modalPrevBtn = document.getElementById('modal-prev-btn');
        const modalNextBtn = document.getElementById('modal-next-btn');


        function openProjectModal(projectData) {
            modalImage.src = projectData.image;
            modalImage.alt = projectData.title;
            modalTitle.textContent = projectData.title;
            modalDescription.textContent = projectData.fullDescription;
            modalDate.textContent = projectData.date;

            modalTools.innerHTML = '';
            projectData.tools.forEach(tool => {
                const span = document.createElement('span');
                span.className = 'skill-tag rounded-md px-3 py-1 text-xs font-medium break-words';
                span.textContent = tool;
                modalTools.appendChild(span);
            });

            if (projectData.github) {
                modalGithubLink.href = projectData.github;
                modalGithubLink.style.display = 'flex';
            } else {
                modalGithubLink.style.display = 'none';
            }
            if (projectData.livedemo) {
                modalLivedemoLink.href = projectData.livedemo;
                modalLivedemoLink.style.display = 'flex';
            } else {
                modalLivedemoLink.style.display = 'none';
            }

            currentModalProjectIndex = currentlyFilteredProjects.findIndex(p => p.id === projectData.id);

            // Previous Button
            if (currentModalProjectIndex > 0) {
                modalPrevBtn.style.display = 'flex';
                modalPrevBtn.onclick = () => {
                    openProjectModal(currentlyFilteredProjects[currentModalProjectIndex - 1]);
                };
            } else {
                modalPrevBtn.style.display = 'none';
            }

            // Next Button
            if (currentModalProjectIndex < currentlyFilteredProjects.length - 1) {
                modalNextBtn.style.display = 'flex';
                modalNextBtn.onclick = () => {
                    openProjectModal(currentlyFilteredProjects[currentModalProjectIndex + 1]);
                };
            } else {
                modalNextBtn.style.display = 'none';
            }

            projectModal.classList.add('show');
            document.body.classList.add('no-scroll');
            projectModal.focus();
        }

        function closeProjectModal() {
            projectModal.classList.remove('show');
            document.body.classList.remove('no-scroll');
        }

        modalCloseBtn.addEventListener('click', closeProjectModal);
        projectModal.addEventListener('click', (e) => {
            if (e.target === projectModal) {
                closeProjectModal();
            }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && projectModal.classList.contains('show')) {
                closeProjectModal();
            }
        });
    </script>
</body>
</html>
